name: Deploy to Firebase Hosting on Merge

on:
  push:
    branches:
      - main # เปลี่ยนเป็นชื่อกิ่งที่คุณต้องการใช้งาน เช่น main หรือ master

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. ดึงโค้ดล่าสุดจากคลังของคุณลงมาทำงาน
      - name: Checkout Repo
        uses: actions/checkout@v4

      # 2. ทำการติดตั้ง Module และรันการ Build ของฝั่ง TypeScript/JavaScript
      - name: Install and Build Web App
        run: |
          npm ci
          npm run build # เปลี่ยนตามเฟรมเวิร์กของคุณ หากใช้ Vite หรือ Next.js เป็นต้น

      # 3. รันระบบการสั่ง Deploy ขึ้น Firebase Hosting
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}"
          projectId: "qualityreport-e2390" # ระบุไอดีโปรเจกต์ของคุณ
          channelId: live # สั่งให้อัปเดตเข้าสู่หน้าเว็บหลักโดยตรงทันที
