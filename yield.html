<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        // Force trailing slash for repository roots on GitHub Pages to prevent relative path 404s
        if (!window.location.pathname.endsWith('/') && !window.location.pathname.includes('.')) {
            window.location.replace(window.location.href + '/');
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMW Quality Portal - Yield Report</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Chart.js & Datalabels Plugin -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <!-- Lucide Icons -->
    <script src="https://cdn.jsdelivr.net/npm/lucide/dist/umd/lucide.min.js"></script>
</head>
<body>
    <div id="sidebar-container"></div>
    <div id="main-wrapper">
        <div id="header-container"></div>
        <main>
            <div class="filters-bar">
                <div class="filter-group">
                    <label for="yield-project">Project</label>
                    <select id="yield-project">
                        <option value="G8X">G8X</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="yield-report-type">Report Type</label>
                    <select id="yield-report-type">
                        <option value="Monthly">Monthly</option>
                        <option value="Quarterly">Quarterly</option>
                    </select>
                </div>
                <div class="filter-group" id="quarter-filter-group" style="display: none;">
                    <label for="yield-quarter">Quarter</label>
                    <select id="yield-quarter">
                        <option value="All">All Quarters</option>
                        <option value="Q1">Q1</option>
                        <option value="Q2">Q2</option>
                        <option value="Q3">Q3</option>
                        <option value="Q4">Q4</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="yield-process">Process Status</label>
                    <select id="yield-process">
                        <option value="Layup">Layup</option>
                        <option value="Trimming">Trimming</option>
                        <option value="Gluing">Gluing</option>
                        <option value="Sanding">Sanding</option>
                        <option value="Dry Sanding">Dry Sanding</option>
                        <option value="Painting">Painting</option>
                        <option value="Polishing">Polishing</option>
                    </select>
                </div>
            </div>

            <!-- Custom Styled Chart Header Banner (specified in requirements) -->
            <div style="display: flex; justify-content: center; margin-bottom: 0.5rem;">
                <div class="chart-header-banner" id="yield-chart-header">
                    LAYUP
                </div>
            </div>

            <!-- Yield Chart Card -->
            <div class="card">
                <div class="chart-wrapper" style="height: 480px;">
                    <canvas id="yieldChart"></canvas>
                </div>
            </div>

            <!-- Yield Data Table Card -->
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title" id="yield-table-title">Yield Report Details Table</h3>
                </div>
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr id="yield-table-header">
                                <!-- Dynamic headers -->
                            </tr>
                        </thead>
                        <tbody id="yield-table-body">
                            <!-- Dynamic rows -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="js/mock-data.js"></script>
    <script src="js/common.js"></script>
    <script src="js/yield.js"></script>
</body>
</html>
